# 小尾巴 (XiaoWeiba) 模型配置文件
# 使用说明：
# 1. 将下方的 YOUR_API_KEY_HERE 替换为你的实际 API Key
# 2. 如果使用 Ollama 等本地模型，修改 apiUrl 为 http://localhost:11434/v1
# 3. 支持多个模型提供商，可以切换使用

model:
  # 默认使用的模型提供商ID
  default: deepseek
  
  # 模型提供商列表
  providers:
    # DeepSeek API
    - id: deepseek
      name: DeepSeek Chat
      apiUrl: https://api.deepseek.com/v1
      apiKey: ${env:DEEPSEEK_API_KEY}  # 从环境变量读取，或直接填写 "sk-xxx"
      maxTokens: 4096
      temperature: 0.6
      enabled: true
    
    # OpenAI API（备用）
    - id: openai
      name: GPT-4
      apiUrl: https://api.openai.com/v1
      apiKey: ${env:OPENAI_API_KEY}  # 从环境变量读取，或直接填写 "sk-xxx"
      maxTokens: 4096
      temperature: 0.6
      enabled: false
    
    # Ollama 本地模型（需要安装Ollama）
    - id: ollama
      name: Ollama Local
      apiUrl: http://localhost:11434/v1
      apiKey: ""  # 本地模型不需要API Key
      maxTokens: 4096
      temperature: 0.6
      enabled: false
      # 注意：需要在Ollama中先拉取模型，例如：ollama pull codellama

# 安全配置
security:
  # 信任级别：strict（严格）/ moderate（适中）/ lenient（宽松）
  trustLevel: moderate
  # 自动批准只读操作
  autoApproveRead: true
  # 写操作需要显示diff确认
  requireDiffForWrite: true
  # 是否允许自动git push
  gitPushEnabled: false

# 记忆配置
memory:
  # 记忆保留天数
  retentionDays: 90
  # 衰减系数（指数衰减 weight * exp(-λ * age_days)）
  decayLambda: 0.01
  # 冷启动信任值（新项目初始信任度）
  coldStartTrust: 20

# 审计日志配置
audit:
  # 日志级别：debug / info / warn / error
  level: info
  # 单个日志文件最大大小（MB）
  maxFileSizeMB: 20
  # 保留的日志文件数量
  maxFiles: 10

# 技能配置
skill:
  # 用户自定义技能目录
  userDir: .xiaoweiba/skills/user
  # 自动下载技能目录
  autoDir: .xiaoweiba/skills/auto
  # 工作流最大深度（防止无限递归）
  maxWorkflowDepth: 5
  # 试用期（天）
  trialPeriod: 5

# 最佳实践配置
bestPractice:
  # 知识来源
  sources:
    - builtin  # builtin / community / custom
  # 仅使用内置知识（禁用外部下载）
  builtinOnly: true
