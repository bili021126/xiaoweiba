# 小尾巴 (XiaoWeiba) 模型配置文件
# 使用说明：
# 1. 将下方的 YOUR_API_KEY_HERE 替换为你的实际 API Key
# 2. 如果使用 Ollama 等本地模型，修改 apiUrl 为 http://localhost:11434/v1
# 3. 支持多个模型提供商，可以切换使用

model:
  # 默认使用的模型提供商ID
  default: deepseek-v4-flash  # ✅ 默认使用Flash，控制成本
  
  # 模型提供商列表
  providers:
    # DeepSeek V4-Pro（复杂推理任务）
    - id: deepseek-v4-pro
      name: DeepSeek V4 Pro
      apiUrl: https://api.deepseek.com/v1
      apiKey: ${env:DEEPSEEK_API_KEY}  # 从环境变量读取，或直接填写 "sk-xxx"
      modelName: deepseek-v4-pro
      maxTokens: 16384
      temperature: 0.6
      enabled: true
    
    # DeepSeek V4-Flash（高频轻任务）
    - id: deepseek-v4-flash
      name: DeepSeek V4 Flash
      apiUrl: https://api.deepseek.com/v1
      apiKey: ${env:DEEPSEEK_API_KEY}  # 共用同一个 API Key
      modelName: deepseek-v4-flash
      maxTokens: 4096
      temperature: 0.6
      enabled: true
    
    # OpenAI API（备用）
    - id: openai
      name: GPT-4
      apiUrl: https://api.openai.com/v1
      apiKey: ${env:OPENAI_API_KEY}  # 从环境变量读取，或直接填写 "sk-xxx"
      maxTokens: 4096
      temperature: 0.6
      enabled: false
    
    # Ollama 本地模型（需要安装Ollama）
    - id: ollama
      name: Ollama Local
      apiUrl: http://localhost:11434/v1
      apiKey: ""  # 本地模型不需要API Key
      maxTokens: 4096
      temperature: 0.6
      enabled: false
      # 注意：需要在Ollama中先拉取模型，例如：ollama pull codellama

# 安全配置
security:
  # 信任级别：strict（严格）/ moderate（适中）/ lenient（宽松）
  trustLevel: moderate
  # 自动批准只读操作
  autoApproveRead: true
  # 写操作需要显示diff确认
  requireDiffForWrite: true
  # 是否允许自动git push
  gitPushEnabled: false

# 记忆配置
memory:
  # 记忆保留天数
  retentionDays: 90
  # 衰减系数（指数衰减 weight * exp(-λ * age_days)，λ=0.1时半衰期约7天）
  decayLambda: 0.1
  # 冷启动信任值（新项目初始信任度）
  coldStartTrust: 20

# 审计日志配置
audit:
  # 日志级别：debug / info / warn / error
  level: info
  # 单个日志文件最大大小（MB）
  maxFileSizeMB: 20
  # 保留的日志文件数量
  maxFiles: 10

# 技能配置
skill:
  # 用户自定义技能目录
  userDir: .xiaoweiba/skills/user
  # 自动下载技能目录
  autoDir: .xiaoweiba/skills/auto
  # 工作流最大深度（防止无限递归）
  maxWorkflowDepth: 5
  # 试用期（天）
  trialPeriod: 5

# 最佳实践配置
bestPractice:
  # 知识来源
  sources:
    - builtin  # builtin / community / custom
  # 仅使用内置知识（禁用外部下载）
  builtinOnly: true

# 长度限制配置
limits:
  # 查询文本最大长度（字符）
  maxQueryLength: ${env:XIAOWEIBA_MAX_QUERY_LENGTH:-1000}
  # 选中代码最大长度（字符）
  maxCodeLength: ${env:XIAOWEIBA_MAX_CODE_LENGTH:-1000}
  # 消息最大长度（字符）
  maxMessageLength: ${env:XIAOWEIBA_MAX_MESSAGE_LENGTH:-5000}
  # 模式历史记录最大条数
  maxModeHistory: ${env:XIAOWEIBA_MAX_MODE_HISTORY:-100}

# 行内补全配置
inlineCompletion:
  # 是否启用行内补全
  enabled: true
  # 触发延迟（毫秒），避免频繁请求
  triggerDelayMs: 300
  # 最大生成token数
  maxTokens: 50
  # 是否启用缓存
  enableCache: true
  # 缓存有效期（秒）
  cacheTTLSeconds: 5

# 时间阈值配置
timeThresholds:
  # 远程时间查询阈值（小时）
  distantTemporalHours: ${env:XIAOWEIBA_DISTANT_TEMPORAL_HOURS:-24}
  # 专家系统检查间隔（小时）
  expertCheckIntervalHours: ${env:XIAOWEIBA_EXPERT_CHECK_INTERVAL_HOURS:-24}
  # 延迟敏感场景阈值（毫秒）
  latencySensitiveMs: ${env:XIAOWEIBA_LATENCY_SENSITIVE_MS:-500}

# 置信度阈值配置
confidenceThresholds:
  # 对话复杂度阈值（触发澄清）
  clarificationComplexity: ${env:XIAOWEIBA_CLARIFICATION_COMPLEXITY:-0.5}
  # 深度模式复杂度阈值
  deepModeComplexity: ${env:XIAOWEIBA_DEEP_MODE_COMPLEXITY:-0.7}
  # 意图主导性阈值
  intentDominance: ${env:XIAOWEIBA_INTENT_DOMINANCE:-0.5}
  # 冷启动高置信度要求
  coldStartHighConfidence: ${env:XIAOWEIBA_COLD_START_HIGH_CONFIDENCE:-0.7}
